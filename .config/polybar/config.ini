[global/wm]
margin-top = 0
margin-bottom = 0

include-file = ~/.config/polybar/colors.ini
include-file = ~/.config/polybar/modules.ini

[settings]
screenchange-reload = true

compositing-background = over
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

[bar/mybar]
monitor = ${env:MONITOR}
monitor-strict = false

override-redirect = false

bottom = false

fixed-center = true

width = 100%
height = 20

background = ${colors.background}
foreground = ${colors.foreground}

radius = 0.0
line-size = 2
line-color = #000000

border-size = 0
;border-left-size = 25
;border-right-size = 25
;border-top-size = 0
;border-bottom-size = 25
border-color = #000000

padding-left = 1
padding-right = 1

module-margin-left = 1
module-margin-right = 1

font-0 = "Ubuntu Nerd Font:style=Bold:size=9;2"
font-1 = "Ubuntu Nerd Font:style=Bold:pixelsize=10;2"
font-2 = "Ubuntu Nerd Font:style=Regular:pixelsize=12;2"

modules-left = i3 xwindow
modules-center = date
modules-right = spotify pulseaudio battery xkeyboard tray

separator = |
dim-value = 1.0

; Enable support for inter-process messaging
; See the Messaging wiki page for more details.
enable-ipc = true

; Set a DPI values used when rendering text
; This only affects scalable fonts
; Set this to 0 to let polybar calculate the dpi from the screen size.
; dpi = 
dpi-x = 96
dpi-y = 96

; Requires polybar to be built with xcursor support (xcb-util-cursor)
; Possible values are:
; - default   : The default pointer as before, can also be an empty string (default)
; - pointer   : Typically in the form of a hand
; - ns-resize : Up and down arrows, can be used to indicate scrolling
cursor-click = pointer
cursor-scroll = ns-resize

[bar/monitor-top]
monitor = HDMI-1
monitor-exact = true
overide-redirect = true

enable-ipc = true

bottom = false

fixed-center = true

width = 100%
height = 23pt
offset-x = 98%
offset-y = 8pt

border-size = 0pt

line-size = 1pt

padding-left = 0pt
padding-right = 0pt

module-margin-left = 0pt
module-margin-right = 0pt

background = ${colors.background}
foreground = ${colors.foreground}

font-0 = ShureTechMono Nerd Font:size=13;4
font-1 = ShureTechMono Nerd Font:size=20;4.5
font-2 = ShureTechMono Nerd Font:size=25;6
font-3 = ShureTechMono Nerd Font:size=16;4

scroll-up = i3.next
scroll-down = i3.prev


; to make them start both in launch.sh

;killall polybar

;polybar mybar | polybar monitor-top