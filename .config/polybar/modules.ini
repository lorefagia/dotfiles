[module/i3]
type = internal/i3

pin-workspaces = true
show-urgent = true
strip-wsnumbers = false
index-sort = false
enable-click = true
enable-scroll = false
wrapping-scroll = false
reverse-scroll = false
fuzzy-match = false

ws-icon-0 = 1;’äĀ
ws-icon-1 = 2;¾░ł╣
ws-icon-2 = 3;’ü╝
ws-icon-3 = 4;¾░Ź®
ws-icon-4 = 5;’ćŗ
ws-icon-5 = 6;’å╝
ws-icon-6 = 7;’ć┐
ws-icon-7 = 8;Ņ¬ż
ws-icon-8 = 9;¾░łĖ
ws-icon-9 = 10;’éŁ 
ws-icon-default = "’ē¼ "

; Available tags:
;   <label-state> (default) - gets replaced with <label-(focused|unfocused|visible|urgent)>
;   <label-mode> (default)
format = <label-state> <label-mode>

label-mode = %mode%
label-mode-padding = 2
label-mode-foreground = ${colors.background}
label-mode-background = ${colors.alert}

label-focused = %icon%
label-focused-background = ${colors.color4}
label-focused-foreground = ${colors.background}
label-focused-padding = 2

label-unfocused = %icon%
label-unfocused-padding = 2
label-unfocused-background = ${colors.background}
label-unfocused-foreground = ${colors.foreground}

label-visible = %icon%
label-visible-background = ${self.label-unfocused-background}
label-visible-foreground = ${self.label-unfocused-foreground}
label-visible-padding = 2

label-urgent = %name% %icon%
label-urgent-background = ${self.label-unfocused-background}
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 4

format-foreground = ${colors.foreground}
format-background = ${colors.background}

[module/backlight]
type = internal/backlight

; Use the following command to list available cards:
; $ ls -1 /sys/class/backlight/
card = intel_backlight

use-actual-brightness = true

scroll-interval = 5

format = <label>
format-foreground = ${colors.foreground}
format-background = ${colors.background}

format-prefix = "’öó  "
format-prefix-foreground = ${colors.color3}
format-prefix-background = ${colors.background}
format-prefix-font = 3

label = %percentage%%

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 80
low-at = 15

format-charging = <animation-charging> <label-charging>
label-charging = " %percentage%%"
format-charging-foreground = ${colors.color2}
format-charging-background = ${colors.background}

format-discharging = <ramp-capacity> <label-discharging>
label-discharging = " %percentage%%"
label-discharging-foreground = ${colors.foreground}
format-discharging-background = ${colors.background}

format-full-prefix = "’ēĆ  "
format-full-prefix-foreground = ${colors.color2}
format-full-foreground = ${colors.color2}
format-full-background = ${colors.background}

format-full-margin = 1
format-full-padding = 0

format-low = <label-low>
label-low = BATTERY LOW: %percentage%%
format-low-background = ${colors.alert}
format-low-foreground = ${colors.background}
label-low-background = ${colors.alert}
label-low-foreground = ${colors.background}

format-charging-margin = 1
format-charging-padding = 0

format-discharging-margin = 1
format-discharging-padding = 0

format-low-margin = 2
format-low-padding = 0

ramp-capacity-0 = ’ēä
ramp-capacity-1 = ’ēā
ramp-capacity-2 = ’ēé
ramp-capacity-3 = ’ēü
ramp-capacity-4 = ’ēĆ
ramp-capacity-foreground = ${colors.color2}
ramp-capacity-font = 3

animation-charging-0 = ’ēä
animation-charging-1 = ’ēā
animation-charging-2 = ’ēé
animation-charging-3 = ’ēü
animation-charging-4 = ’ēĆ
animation-charging-foreground = ${colors.color2}
animation-chargin-font = 3
animation-charging-framerate = 750

[module/date]
type = internal/date

interval = 5

date = " %a %b %d, %Y"
time = %l:%M%p
time-alt = %l:%M%p
format-prefix = "¾░āŁ"
format-prefix-foreground = ${colors.color5}
format-foreground = ${colors.color5}
format-background = ${colors.background}

format-margin = 1
format-padding = 0

label = "%date%  - %time% "

[module/pulseaudio]
type = internal/pulseaudio

use-ui-max = false
interval = 5

format-volume = <label-volume> <ramp-volume>

label-volume = "vol: "
label-volume-background = ${colors.background}
label-volume-foreground = ${colors.foreground}

format-muted = <label-muted>
label-muted = "vol: muted"
label-muted-background = ${colors.background}
label-muted-foreground = ${colors.foreground}
label-muted-underline = ${colors.alert}

format-volume-margin = 1
format-volume-padding = 0

format-muted-margin = 1
format-muted-padding = 0

ramp-volume-0 = "low"
ramp-volume-1 = "mid"
ramp-volume-2 = "high"
ramp-volume-foreground = ${colors.color4}
; ramp-volume-font = 3

[module/tray]
type = internal/tray

tray-spacing = 2
tray-padding = 1
tray-size = 81%

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = scroll lock

format = <label-layout> <label-indicator>

format-prefix = "’ä£  "
format-prefix-foreground = ${colors.color6}
format-prefix-background = ${colors.background}
format-prefix-font = 3

format-foreground = ${colors.foreground}
format-background = ${colors.background}

format-margin = 1
format-padding = 0 

label-layout = %layout%
label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-background = ${colors.background}
label-indicator-underline = ${colors.color6}
label-indicator-font = 2

[module/xwindow]
type = internal/xwindow

format = <label>

label = %title%
label-maxlen = 50
label-font = 2

format-prefix = "*  "
format-suffix = "  *"
format-foreground = ${colors.color10}
format-background = ${colors.background}
format-margin = 2
format-padding = 0
