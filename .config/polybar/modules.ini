[module/i3]
type = internal/i3

pin-workspaces = true
show-urgent = true
strip-wsnumbers = false
index-sort = false
enable-click = true
enable-scroll = false
wrapping-scroll = false
reverse-scroll = false
fuzzy-match = false

ws-icon-0 = 1;
ws-icon-1 = 2;󰈹
ws-icon-2 = 3;
ws-icon-3 = 4;󰍩
ws-icon-4 = 5;
ws-icon-5 = 6;
ws-icon-6 = 7;
ws-icon-7 = 8;
ws-icon-8 = 9;󰈸
ws-icon-9 = 10;
ws-icon-default = " "

; Available tags:
;   <label-state> (default) - gets replaced with <label-(focused|unfocused|visible|urgent)>
;   <label-mode> (default)
format = <label-state> <label-mode>

label-mode = %mode%
label-mode-padding = 2
label-mode-foreground = ${colors.color0}
label-mode-background = ${colors.color1}

label-focused = %icon%
label-focused-background = ${colors.background}
label-focused-foreground = ${colors.foreground}
label-focused-underline = ${colors.color4}
label-focused-padding = 2

label-unfocused = %icon%
label-unfocused-padding = 2
label-unfocused-background = ${colors.background}
label-unfocused-foreground = ${colors.foreground}
label-unfocused-underline = ${colors.background}

label-visible = %icon%
label-visible-background = ${self.label-focused-background}
label-visible-foreground = ${self.label-focused-foreground}
label-visible-underline = ${self.label-focused-underline}
label-visible-padding = 2

label-urgent = %name% %icon%
label-urgent-background = ${self.label-focused-background}
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 4

format-foreground = ${colors.foreground}
format-background = ${colors.background}

[module/backlight]
type = internal/backlight

; Use the following command to list available cards:
; $ ls -1 /sys/class/backlight/
card = intel_backlight

use-actual-brightness = true

scroll-interval = 10

format = <label>
format-foreground = ${colors.foreground}
format-background = ${colors.background}

label = %percentage%%

; Only applies if <ramp> is used
ramp-0 = 🌕
ramp-1 = 🌔
ramp-2 = 🌓
ramp-3 = 🌒
ramp-4 = 🌑

; Only applies if <bar> is used
bar-width = 10
bar-indicator = |
bar-fill = ─
bar-empty = ─

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 80
low-at = 10

format-charging = <animation-charging> <label-charging>
label-charging = " %percentage%%"
format-charging-foreground = ${colors.color2}
format-charging-background = ${colors.background}

format-discharging = <ramp-capacity> <label-discharging>
label-discharging = " %percentage%%"
label-discharging-foreground = ${colors.foreground}
format-discharging-background = ${colors.background}

format-full-prefix = "  "
format-full-prefix-foreground = ${colors.color2}
format-full-foreground = ${colors.color2}
format-full-background = ${colors.background}

format-full-margin = 1
format-full-padding = 0

format-low = <label-low>
label-low = BATTERY LOW: %percentage%%
format-low-background = ${colors.alert}
forma-low-foreground = ${colors.background}
label-low-background = ${colors.alert}
label-low-foreground = ${colors.background}

format-charging-margin = 1
format-charging-padding = 0

format-discharging-margin = 1
format-discharging-padding = 0

format-low-margin = 2
format-low-padding = 0

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-foreground = ${colors.color1}

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-foreground = ${colors.color2}
animation-charging-framerate = 750

[module/bluetoothctl]
type = custom/script
exec = ~/.config/polybar/scripts/system-bluetooth-bluetoothctl.sh
tail = true
click-left = ~/.config/polybar/scripts/system-bluetooth-bluetoothctl.sh --toggle &

[module/cpu]
type = internal/cpu

interval = 1

warn-percentage = 95

format-prefix = " "
format-prefix-foreground = #ffb86c

format = <label>

format-foreground = ${colors.foreground}
format-background = ${colors.background}
format-margin = 2
format-padding = 0

label-font = 1

label = Cpu %percentage:3%%

[module/date]
type = internal/date

interval = 5

date = " %a %b %d, %Y"
date-alt = " %a %b %d, %Y"
time = %l:%M%p
time-alt = %l:%M%p
format-prefix = "󰃭"
format-prefix-foreground = ${colors.color4}
format-foreground = ${colors.color4}
format-background = ${colors.background}

format-margin = 1
format-padding = 0

label = "%date%  - %time% "

[module/filesystem]
type = internal/fs

; Mountpoints to display
mount-0 = /
;mount-1 = /home
;mount-2 = /var

; Seconds to sleep between updates. Default: 30
interval = 30
; Display fixed precision values. Default: false
fixed-values = false
; Spacing between entries. Default: 2
spacing = 4

; Available tags:
;   <label-mounted> (default)
;   <bar-free>
;   <bar-used>
;   <ramp-capacity>
format-mounted = <label-mounted>
format-mounted-foreground = ${colors.color1}
format-mounted-background = ${colors.background}
format-mounted-underline = ${colors.color1}
format-mounted-margin = 2
format-mounted-padding = 0

; Available tokens:
;   %mountpoint%
;   %type%
;   %fsname%
;   %percentage_free%
;   %percentage_used%
;   %total%
;   %free%
;   %used%
; Default: %mountpoint% %percentage_free%%
label-mounted = hdd: %free% free

; Available tokens:
;   %mountpoint%
; Default: %mountpoint% is not mounted
label-unmounted = %mountpoint% not mounted
format-unmounted-foreground = ${colors.foreground}
format-unmounted-background = ${colors.background}
;format-unmounted-underline = ${colors.alert}

[module/kernel]
type = custom/script
exec = uname -r
tail = false
interval = 1024
format-prefix = " 🤖 "
format-prefix-foreground = ${colors.color2}
format-foreground = ${colors.color2}
format-background = ${colors.background}
format-underline = ${colors.color2}
format-margin = 2
format-padding = 0

[module/memory]
type = internal/memory

interval = 1
; Available tokens:
;   %percentage_used% (default)
;   %percentage_free%
;   %gb_used%
;   %gb_free%
;   %gb_total%
;   %mb_used%
;   %mb_free%
;   %mb_total%
label = %percentage_used%%

format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.color3}
format-foreground = ${colors.color3}
format-background = ${colors.background}

format-margin = 2
format-padding = 0

[module/networkspeed]
type = internal/network

interface = wlp0s20f3

label-connected = "%upspeed:7%    %downspeed:7%"

format-connected = <label-connected>
format-connected-prefix = " "
format-connected-prefix-foreground = ${colors.color2}
format-connected-foreground = ${colors.color2}
format-connected-background = ${colors.background}
format-connected-underline = ${colors.color2}
format-connected-margin = 2
format-connected-padding = 0

[module/networkspeedup]
type = internal/network

interface-type = wireless
interface = wlp0s20f3

interval = 3.0

label-connected = "%upspeed:7%"

format-connected = <label-connected>
format-connected-prefix = "  "
format-connected-prefix-foreground = ${colors.color4}
format-connected-foreground = ${colors.color4}
format-connected-background = ${colors.background}

format-margin = 2
format-padding = 0

[module/networkspeeddown]
type = internal/network

interface = wlp0s20f3

label-connected = "%downspeed:7%"

format-connected = <label-connected>
format-connected-prefix = "  "
format-connected-prefix-foreground = ${colors.color6}
format-connected-foreground = ${colors.color6}
format-connected-background = ${colors.background}
format-connected-margin = 6

[module/pulseaudio]
type = internal/pulseaudio

use-ui-max = false
interval = 5

format-volume = <label-volume>
format-volume-prefix = "   "
format-volume-prefix-foreground = ${colors.color3}
format-volume-prefix-background = ${colors.background}

label-volume = %percentage%%
label-volume-background = ${colors.background}
label-volume-foreground = ${colors.foreground}

format-muted = <label-muted> muted
label-muted = "󰝟 "
label-muted-background = ${colors.background}
label-muted-foreground = ${colors.alert}

format-volume-margin = 1
format-volume-padding = 0

format-muted-margin = 1
format-muted-padding = 0

[module/spotify]
type = custom/script
interval = 1

format-prefix = "󰓇 "
format-prefix-foreground = ${colors.color2}
format = <label>

forma-margin = 1
format-padding = 0

exec = python ~/.config/polybar/scripts/spotify_status.py -f '{artist} - {song} '

;control players (optional)
click-left = playerctl --player=spotify play-pause 
click-right = playerctl --player=spotify next 
click-middle = playerctl --player=spotify previous 

[module/tray]
type = internal/tray

tray-spacing = 2
tray-padding = 1
tray-size = 70%

[module/volume]
type = internal/volume

format-volume = "<label-volume> <bar-volume>"

label-volume = " "
label-volume-foreground = ${colors.color5}
label-muted = muted

bar-volume-width = 5
bar-volume-foreground-0 = ${colors.color5}
bar-volume-foreground-1 = ${colors.color5}
bar-volume-foreground-2 = ${colors.color5}
bar-volume-foreground-3 = ${colors.color5}
bar-volume-foreground-4 = ${colors.color5}

bar-volume-gradient = false
bar-volume-indicator = 
bar-volume-fill = 
bar-volume-empty = 

bar-volume-empty-foreground = ${colors.foreground}

format-volume-foreground = ${colors.foreground}
format-volume-background = ${colors.background}

format-muted-prefix = "  "
format-muted-prefix-foreground = ${colors.alert}

format-muted-foreground = ${colors.foreground}
format-muted-background = ${colors.background}

[module/wired-network]
type = internal/network

interface-type = wired
interface = enp0s31f6
interval = 3.0

; Available tokens:
;   %ifname%    [wireless+wired]
;   %local_ip%  [wireless+wired]
;   %essid%     [wireless]
;   %signal%    [wireless]
;   %upspeed%   [wireless+wired]
;   %downspeed% [wireless+wired]
;   %linkspeed% [wired]
; Default: %ifname% %local_ip%
label-connected =  %ifname%
label-disconnected = %ifname% disconnected

format-connected-foreground = ${colors.foreground}
format-connected-background = ${colors.background}
format-connected-underline = #55aa55
format-connected-prefix = " "
format-connected-prefix-foreground = #55aa55
format-connected-prefix-background = ${colors.background}

format-disconnected = <label-disconnected>
format-disconnected-underline = ${colors.alert}
label-disconnected-foreground = ${colors.foreground}

[module/wireless-network]
type = internal/network

interface-type = wireless
interface = wlp0s20f3
interval = 3.0
label-connected = %essid%

format-connected = <label-connected>
;format-connected = <ramp-signal> <label-connected>
format-connected-foreground = ${colors.foreground}
format-connected-background = ${colors.background}
format-connected-prefix = "  "
format-connected-prefix-foreground = ${colors.foreground}
format-connected-prefix-background = ${colors.background}
format-connected-underline = ${colors.foreground}

format-connected-margin = 2
format-connected-padding = 0

label-disconnected = %ifname% disconnected
label-disconnected-foreground = ${colors.alert}
label-disconnected-background = ${colors.background}

format-disconnected = <label-disconnected>
format-disconnected-foreground = ${colors.alert}
format-disconnected-background = ${colors.background}
format-disconnected-prefix = " 󰖪 "
format-disconnected-prefix-foreground = ${colors.alert}
format-disconnected-prefix-background = ${colors.background}
format-disconnected-underline =${colors.alert}

forma-disconnected-margin = 2
format-disconnected-padding = 0

[module/xbacklight]
type = internal/xbacklight

format = <label> <bar>
format-prefix = "   "
format-prefix-foreground = ${colors.foreground}
format-prefix-background = ${colors.background}
format-prefix-underline = #9f78e1
format-underline = #9f78e1

label = %percentage%%

bar-width = 10
bar-indicator = 
bar-indicator-foreground = #fff
bar-indicator-font = 2
bar-fill = 
bar-fill-font = 2
bar-fill-foreground = #9f78e1
bar-empty = 
bar-empty-font = 2
bar-empty-foreground = #fff

format-foreground = ${colors.foreground}
format-background = ${colors.background}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = scroll lock

format = <label-layout> <label-indicator>

format-prefix = "  "
format-prefix-foreground = ${colors.color6}
format-prefix-background = ${colors.background}
format-foreground = ${colors.foreground}
format-background = ${colors.background}

format-margin = 2
format-padding = 0 

label-layout = %layout%
label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-background = ${colors.background}

[module/xwindow]
type = internal/xwindow

format = <label>

label = %title%
label-maxlen = 50
label-font = 2

format-prefix = "*  "
format-suffix = "  *"
format-foreground = ${colors.color10}
format-background = ${colors.background}
format-margin = 2
format-padding = 0
